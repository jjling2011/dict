name: Build and Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

env:
  DICT_DB_ZIP: "https://github.com/jjling2011/dict/releases/download/dictdb/dictdb.zip"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Restore NuGet packages
        run: nuget restore Dict.sln

      - name: Build solution in Release
        run: msbuild Dict.sln /p:Configuration=Release /p:Platform="Any CPU" /m

      - name: Download and extract database
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "$env.DICT_DB_ZIP" -OutFile 'dictdb.zip'
          New-Item -ItemType Directory -Force -Path 'bin\Release\dictdb'
          Expand-Archive -Path 'dictdb.zip' -DestinationPath 'bin\Release\dictdb' -Force

      - name: Archive release folder
        shell: pwsh
        run: Compress-Archive -Path 'bin\Release\*' -DestinationPath 'dict.zip'

      - name: Determine release tag
        id: tag
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq 'tag') {
            "tag_name=$env:GITHUB_REF_NAME" >> $env:GITHUB_OUTPUT
          } else {
            $timestamp = Get-Date -Format 'yyyyMMdd-HHmmss'
            "tag_name=release-$timestamp" >> $env:GITHUB_OUTPUT
          }

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          create_tag: true
          files: dict.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
