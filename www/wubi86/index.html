<!doctype html>
<html lang="zh-Hans">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="creater" content="DeepSeek v3" />
        <title>五笔反查86版</title>
        <link rel="stylesheet" href="../style/base.css" />
        <script src="table86.js"></script>
        <style>
            .container {
                display: flex;
                margin: 0.25rem 0;
            }

            #inputBox {
                padding: 0.25rem;
            }

            #outputBox {
                white-space: pre-line;
                padding: 0.25rem;
            }
        </style>
    </head>
    <body>
        <div class="nav-bar">
            <span>五笔反查86版</span><a href="../index.html">主页</a>
        </div>
        <input
            class="container user-input"
            type="text"
            inputmode="text"
            lang="zh-Hans"
            id="inputBox"
            oninput="update()"
            placeholder="在这里输入内容..."
            autofocus
        />
        <div id="outputBox" class="container"></div>
    </body>

    <script>
        // 获取输入框和输出框的元素
        const inputBox = document.getElementById("inputBox")
        const outputBox = document.getElementById("outputBox")
        const filters = "1234567890abcdefghijklmnopqrstuvwxyz"

        if (!TABLE86) {
            show("错误：加载数据库失败！")
        }

        window.Android && window.Android.showIme()

        function lookup(str) {
            const arr = []
            for (let c of [...str]) {
                if (filters.indexOf(c) < 0) {
                    const idx = TABLE86.indexOf(c)
                    if (idx >= 0) {
                        const frag = TABLE86.substring(idx + 1, idx + 5)
                        const match = frag.match(/([a-z]+)/)
                        if (match && match[0]) {
                            const code = match[0]
                            arr.push(`${c}(${code})`)
                            continue
                        }
                    }
                }
                arr.push(`${c}`)
            }
            return arr.join(" ")
        }

        function show(result) {
            outputBox.textContent = result
        }

        function update() {
            const str = inputBox.value
            const result = lookup(str)
            show(result)
        }
    </script>
</html>
