<!doctype html>
<html lang="zh-Hans">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>列表计算器</title>
        <link rel="stylesheet" href="../style/base.css" />
        <link rel="stylesheet" href="../style/dialogs.css" />
        <link rel="stylesheet" href="./style.css" />
        <script src="../libs/jquery-3.7.1.min.js"></script>
        <script src="../libs/dialogs.js"></script>
    </head>
    <body>
        <div class="box">
            <input
                type="text"
                inputmode="decimal"
                id="listInput"
                placeholder="单价 数量 备注，用空格或 * 分隔，按回车添加"
                autofocus
            />
        </div>
        <div id="tools-container" class="box">
            <button id="saveRecord">保存</button>
            <button id="loadRecord">加载</button>
            <button id="replaceRecord">替换</button>
            <button id="removeRecord">删除</button>
            <span class="grow"></span>
            <button id="clearAll">清空</button>
            <button id="fillZero">归零</button>
        </div>
        <div class="box right">
            <span id="totalDiscountSpan"></span>
            <span id="totalSpan"></span>
        </div>
        <ul id="itemsList"></ul>
    </body>
    <script>
        const LIST_CALC_KEY = "list-calc-data"
        const dialogs = CreateDialogs()
        const db = loadDb()
        update()

        window.Android && window.Android.showIme()

        $("#totalDiscountSpan").on("click", () => changeTotalDiscount())
        $("#totalSpan").on("click", () => changeTotalDiscount())

        $("#clearAll").on("click", async () => {
            const ok = await dialogs.confirm("确定要清除所有数据吗？")
            if (!ok) {
                return
            }
            db.cur.rows = []
            db.cur.totalDiscount = 0
            saveDb()
            update()
        })

        $("#fillZero").on("click", async () => {
            const ok = await dialogs.confirm("确定要把所有数量归零吗？")
            if (!ok) {
                return
            }
            const rows = db.cur.rows
            for (let i = 0; i < rows.length; i++) {
                rows[i].amount = 0
            }
            saveDb()
            update()
        })

        $("#saveRecord").on("click", async () => {
            const name = await dialogs.prompt("请输入记录名：", "")
            if (!name) {
                return
            }
            const content = JSON.stringify(db.cur)
            db.records[name] = content
            saveDb()
        })

        async function selectRecordName(tip) {
            const names = Object.keys(db.records)
            if (!names || names.length < 1) {
                dialogs.alert("没有记录可选")
                return null
            }
            names.sort()
            const name = await dialogs.select(`请选择要${tip}的记录：`, names)
            return name
        }

        $("#loadRecord").on("click", async () => {
            const name = await selectRecordName(`加载`)
            if (!name) {
                return
            }
            try {
                db.cur = JSON.parse(db.records[name])
                saveDb()
            } catch (err) {
                dialogs.alert(`${err.message}`)
            }
            update()
        })

        $("#replaceRecord").on("click", async () => {
            const name = await selectRecordName(`替换`)
            if (!name) {
                return
            }
            const content = JSON.stringify(db.cur)
            db.records[name] = content
            saveDb()
        })

        $("#removeRecord").on("click", async () => {
            const name = await selectRecordName(`删除`)
            if (!name) {
                return
            }
            delete db.records[name]
            saveDb()
            update()
        })

        $("#listInput").on("keydown", function (e) {
            if (e.key === "Enter") {
                e.preventDefault()
                addListItem()
            }
        })

        function addListItem() {
            const input = $("#listInput")
            const str = input.val()
            input.val("")
            try {
                const arr = str.split(/[* ]+/).filter((s) => !!s)
                const d = {
                    price: parseFloat(arr[0]) || 1,
                    amount: parseFloat(arr[1]) || 1,
                    remark: arr[2] || "",
                }
                db.cur.rows.push(d)
                saveDb()
            } catch {}
            update()
        }

        function log(...args) {
            console.log(...args)
        }

        let saveDbHandle = undefined
        function saveDb() {
            clearInterval(saveDbHandle)
            saveDbHandle = setTimeout(() => {
                try {
                    const s = JSON.stringify(db)
                    localStorage.setItem(LIST_CALC_KEY, s)
                } catch {}
            }, 500)
        }

        function tryLoadOldDb(def) {
            const key = "list-calc-db"
            const str = localStorage.getItem(key)
            if (!str) {
                return null
            }
            try {
                const db = JSON.parse(JSON.stringify(def))
                const old = JSON.parse(str)
                db.cur.rows = old.cur
                for (let name in old.records) {
                    const rows = JSON.parse(old.records[name])
                    const record = {
                        ["rows"]: rows,
                        ["totalDiscount"]: 0,
                    }
                    db.records[name] = JSON.stringify(record)
                }
                return db
            } catch (err) {
                dialogs.alert(`转换旧数据失败：\n${err.message}`)
            }
            return null
        }

        function loadDb() {
            const def = {
                records: {},
                cur: {
                    rows: [],
                    totalDiscount: 0,
                },
            }
            const str = localStorage.getItem(LIST_CALC_KEY)
            if (!str) {
                const old = tryLoadOldDb(def)
                return old || def
            }
            try {
                const d = JSON.parse(str)
                if (!d) {
                    return def
                }
                for (let key in def) {
                    if (!d[key]) {
                        d[key] = def[key]
                    }
                }
                return d
            } catch {}
            return def
        }

        async function removeRow(i) {
            const ok = await dialogs.confirm(`确定要删除第 [${i + 1}] 行吗？`)
            if (!ok) {
                return
            }
            db.cur.rows.splice(i, 1)
            saveDb()
            update()
        }

        function changeValue(i, evt, key) {
            const el = $(evt.target)
            try {
                const s = el.val()
                db.cur.rows[i][key] = parseFloat(s)
                saveDb()
            } catch {}
            update()
        }

        async function changeTotalDiscount() {
            const cur = db.cur.totalDiscount || 0
            const d = await dialogs.prompt("修改总折扣（填零删除）：", cur)
            if (d === null) {
                return
            }
            db.cur.totalDiscount = d
            saveDb()
            update()
        }

        async function changeDiscount(index) {
            const row = db.cur.rows[index]
            const cur = row.discount || 0
            const d = await dialogs.prompt("修改折扣（填零删除）：", cur)
            if (d === null) {
                return
            }
            row.discount = d
            saveDb()
            update()
        }

        async function changeRemark(index) {
            const row = db.cur.rows[index]
            const cur = row.remark
            const remark = await dialogs.prompt("修改备注：", cur)
            if (remark === null) {
                return
            }
            row.remark = remark
            saveDb()
            update()
        }

        function toFixed(n) {
            return (n * 1 || 0).toFixed(2)
        }

        function update() {
            const container = $("#itemsList")
            container.empty()
            let total = 0
            const rows = db.cur.rows
            for (let idx = 0; idx < rows.length; idx++) {
                const i = idx
                const row = rows[i]
                const discount = row.discount > 0 ? row.discount : 1
                const subTotal = row.amount * row.price * discount
                total = total + subTotal

                const li = $("<li>")

                const line1 = genLine1(i, row, subTotal)
                li.append(line1)

                if (row.remark || row.discount) {
                    const line2 = genLine2(row, i)
                    li.append(line2)
                }

                container.append(li)
            }
            updateTotals(total, db.cur.totalDiscount)
        }

        function updateTotals(total, discount) {
            const spanDiscount = $("#totalDiscountSpan")
            const spanTotal = $("#totalSpan")
            if (discount > 0) {
                spanDiscount.css("color", "orangered")
                spanDiscount.text(`含折扣（${toFixed(discount)}）：`)
                spanTotal.text(toFixed(total * discount))
            } else {
                spanDiscount.text(`合计：`)
                spanDiscount.css("color", "darkgray")
                spanTotal.text(toFixed(total))
            }
        }

        function genLine1(idx, row, subTotal) {
            const line1 = $("<div>")

            const tag = $(`<span>${idx + 1}.</span>`)
            tag.addClass("index")
            tag.on("click", () => changeRemark(idx))
            line1.append(tag)

            const price = $(`<input type="number">`)
            price.addClass("price")
            price.val(toFixed(row.price))
            price.on("change", (evt) => changeValue(idx, evt, "price"))
            price.on("click", (evt) => $(evt.target).select())
            line1.append(price)

            line1.append($("<span>x</span>"))

            const amo = $(`<input type="number">`)
            amo.addClass("amount")
            amo.val(row.amount)
            amo.on("change", (evt) => changeValue(idx, evt, "amount"))
            amo.on("click", (evt) => $(evt.target).select())
            line1.append(amo)

            line1.append($("<span>=</span>"))
            const sub = $(`<span>${toFixed(subTotal)}</span>`)
            sub.addClass("sub-total")
            sub.on("click", () => changeDiscount(idx))
            line1.append(sub)

            const del = $("<button>删除</button>")
            del.on("click", () => removeRow(idx))
            line1.append(del)
            return line1
        }

        function genLine2(row, idx) {
            const line2 = $("<div>")
            const leading = $(`<span class="remark-leading">`)
            line2.append(leading)

            if (row.remark) {
                const spanRemark = $("<span>")
                spanRemark.addClass("remark")
                spanRemark.text(`备注：${row.remark}`)
                spanRemark.on("click", () => changeRemark(idx))
                line2.append(spanRemark)
            }

            if (row.discount > 0) {
                const spanDiscount = $("<span>")
                spanDiscount.addClass("remark")
                spanDiscount.text(`折扣：${row.discount}`)
                spanDiscount.on("click", () => changeDiscount(idx))
                line2.append(spanDiscount)
            }
            return line2
        }
    </script>
</html>
